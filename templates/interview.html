<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Career Agent - Interview</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>AI Career Agent</h1>
      <p>Answer each question within the time limit</p>
    </header>

    <!-- Metrics row -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Question</div>
        <div class="metric-value" id="q-num">1 / 5</div>
      </div>
      <div class="metric">
        <div class="metric-label">Skill</div>
        <div class="metric-value" id="skill">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Time Left</div>
        <div class="metric-value" id="time-left" style="color: var(--primary);">120s</div>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress">
      <div class="progress-fill" id="progress-fill" style="width: 100%;"></div>
    </div>

    <!-- Question card -->
    <div class="card">
      <div class="question" id="question">Loading...</div>
      <div class="question-context" id="question-context" style="display: none;"></div>
      <textarea id="answer" placeholder="Type your answer here..."></textarea>

      <div class="btn-row">
        <button class="btn btn-primary" id="submit-btn">Submit Answer</button>
        <button class="btn btn-secondary" id="skip-btn">Skip</button>
        <button class="btn btn-secondary" id="next-btn">Next ➡️</button>
      </div>
    </div>

    <div class="alert alert-warning" id="timeout-alert" style="display: none;">
      ⏱ Time's up — click Submit Answer or Skip below.
    </div>

  </div>

  <script src="{{ url_for('static', filename='interview.js') }}"></script>
</body>
</html>
